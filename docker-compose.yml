version: '3.8'

services:
  agency-bot:
    build: .
    container_name: agency-bot
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - .env
    command: python main.py --mode schedule

  agency-api:
    build: .
    container_name: agency-api
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload

  agency-web:
    build: ./web
    container_name: agency-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - agency-api
